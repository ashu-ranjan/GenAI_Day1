<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathSolve · Ashutosh Ranjan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #020408;
      --surface:    rgba(10, 15, 25, 0.6);
      --panel:      rgba(15, 20, 35, 0.4);
      --border:     rgba(255, 255, 255, 0.05);

      --cyan:       #00f2ff;
      --cyan-dim:   rgba(0, 242, 255, 0.08);
      --cyan-glow:  rgba(0, 242, 255, 0.3);

      --violet:     #ad4dff;
      --violet-dim: rgba(173, 77, 255, 0.08);
      --violet-glow:rgba(173, 77, 255, 0.3);

      --amber:      #ffac00;
      --amber-dim:  rgba(255, 172, 0, 0.08);
      --amber-glow: rgba(255, 172, 0, 0.2);

      --text:       #f0f4f8;
      --text-muted: #94a3b8;

      --mono: 'Space Mono', monospace;
      --sans: 'Outfit', sans-serif;

      --radius: 24px;
      --radius-sm: 16px;
      --glass: blur(20px) saturate(160%);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 80px;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(173, 77, 255, 0.05) 0%, transparent 50%);
    }

    /* Subtle Animated Background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      pointer-events: none;
      z-index: -1;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 840px;
      padding: 60px 0 40px;
      text-align: center;
      animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dev-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--cyan);
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--cyan-dim);
      border: 1px solid rgba(0,242,255,0.2);
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 24px;
      box-shadow: 0 0 20px rgba(0,242,255,0.1);
    }
    .dev-badge span { font-weight: 700; color: #fff; }

    h1 {
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
      background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 18px;
      font-weight: 300;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Main card ─────────────────────────────────────────────── */
    main {
      width: 100%;
      max-width: 840px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--panel);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }
    .card:hover {
      border-color: rgba(255,255,255,0.12);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    /* ── Input section ─────────────────────────────────────────── */
    .input-group { position: relative; }
    
    .input-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--sans);
      font-size: 17px;
      line-height: 1.6;
      padding: 24px;
      resize: none;
      outline: none;
      transition: all 0.3s;
    }
    textarea:focus {
      background: rgba(0,0,0,0.4);
      border-color: var(--cyan);
      box-shadow: 0 0 0 4px var(--cyan-dim);
    }

    .example-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }
    .pill-btn {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .pill-btn:hover {
      color: #fff;
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    /* ── Solve button ──────────────────────────────────────────── */
    .btn-solve {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 20px;
      background: #fff;
      border: none;
      border-radius: var(--radius-sm);
      color: #000;
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 10px 20px rgba(255,255,255,0.1);
    }
    .btn-solve:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 20px 40px rgba(0,242,255,0.2);
    }
    .btn-solve:active:not(:disabled) { transform: scale(0.98); }
    .btn-solve:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Loading ───────────────────────────────────────────────── */
    .loader {
      display: none;
      padding: 60px;
      text-align: center;
    }
    .loader.active { display: block; }
    
    .loader-ring {
      width: 64px; height: 64px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--cyan);
      border-radius: 50%;
      margin: 0 auto 24px;
      animation: spin 1s infinite cubic-bezier(0.5, 0, 0.5, 1);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ───────────────────────────────────────────────── */
    #results { display: none; margin-top: 12px; }
    #results.active { display: flex; flex-direction: column; gap: 24px; animation: fadeInUp 0.6s both; }

    .result-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .section-icon {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px;
      font-size: 14px;
    }
    .icon-answer { background: var(--cyan-dim); color: var(--cyan); }
    .icon-steps  { background: var(--violet-dim); color: var(--violet); }
    .icon-verify { background: var(--amber-dim); color: var(--amber); }

    .section-title {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .answer-text {
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
    }

    .steps-list { list-style: none; display: flex; flex-direction: column; gap: 16px; }
    .step-item { display: flex; gap: 20px; animation: stepFade 0.4s both; }
    @keyframes stepFade { from { opacity: 0; transform: translateX(-10px); } }

    .step-num {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--violet-dim);
      border: 1px solid rgba(173,77,255,0.2);
      color: var(--violet);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .step-text { font-size: 16px; color: var(--text); line-height: 1.6; }

    .verify-text { font-size: 15px; color: var(--amber); font-family: var(--mono); line-height: 1.6; }

    /* ── Footer ────────────────────────────────────────────────── */
    footer {
      width: 100%;
      max-width: 840px;
      text-align: center;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
    }
    footer a { color: var(--cyan); text-decoration: none; font-weight: 700; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .card { padding: 24px; }
      h1 { font-size: 40px; }
      .answer-text { font-size: 24px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="dev-badge">Developed by <span>Ashutosh Ranjan</span></div>
    <h1>MathSolve</h1>
    <p class="subtitle">High-precision Chain-of-Thought architecture powered by LLM reasoning.</p>
  </header>

  <main>
    <div class="card">
      <div class="input-group">
        <label class="input-label">Describe your problem</label>
        <textarea
          id="problemInput"
          placeholder="e.g. If a car travels 120 miles in 2 hours, what is its average speed?"
          spellcheck="false"
        ></textarea>
      </div>

      <div class="example-pills">
        <button class="pill-btn" onclick="fillExample(this)">Find the derivative of x² + 5x</button>
        <button class="pill-btn" onclick="fillExample(this)">Solve for x: 3x - 7 = 11</button>
        <button class="pill-btn" onclick="fillExample(this)">Area of a rectangle (5m x 8m)</button>
      </div>
    </div>

    <button class="btn-solve" id="solveBtn" onclick="solve()">
      Solve with CoT Intelligence
    </button>

    <div class="loader" id="loader">
      <div class="loader-ring"></div>
      <div class="section-title">Analyzing Problem...</div>
    </div>

    <div id="results">
      <div class="result-section">
        <div class="section-header">
          <div class="section-icon icon-answer">A</div>
          <div class="section-title">Final Result</div>
        </div>
        <div class="answer-text" id="finalAnswer"></div>
      </div>

      <div class="result-section">
        <div class="section-header">
          <div class="section-icon icon-steps">S</div>
          <div class="section-title">Reasoning Steps</div>
        </div>
        <ul class="steps-list" id="stepsList"></ul>
      </div>

      <div class="result-section" id="verifySection" style="display:none">
        <div class="section-header">
          <div class="section-icon icon-verify">V</div>
          <div class="section-title">Verification</div>
        </div>
        <div class="verify-text" id="verifyText"></div>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2024 &middot; Build with ❤️ by <a href="https://github.com/ashu-ranjan">Ashutosh Ranjan</a>
  </footer>

  <script>
    const API_BASE = 'http://localhost:8000';

    function fillExample(btn) {
      document.getElementById('problemInput').value = btn.textContent.trim();
      document.getElementById('problemInput').focus();
    }

    function setLoading(on) {
      const btn = document.getElementById('solveBtn');
      const loader = document.getElementById('loader');
      btn.style.display = on ? 'none' : 'flex';
      loader.classList.toggle('active', on);
    }

    function showResults(data) {
      document.getElementById('results').classList.add('active');
      document.getElementById('finalAnswer').textContent = data.final_answer;
      
      const list = document.getElementById('stepsList');
      list.innerHTML = '';
      (data.step_summary || []).forEach((step, i) => {
        const li = document.createElement('li');
        li.className = 'step-item';
        li.style.animationDelay = `${i * 0.1}s`;
        li.innerHTML = `
          <div class="step-num">${i + 1}</div>
          <div class="step-text">${step}</div>
        `;
        list.appendChild(li);
      });

      if (data.verification) {
        document.getElementById('verifyText').textContent = data.verification;
        document.getElementById('verifySection').style.display = 'block';
      }
    }

    async function solve() {
      const problem = document.getElementById('problemInput').value.trim();
      if (!problem) return;

      document.getElementById('results').classList.remove('active');
      setLoading(true);

      try {
        const resp = await fetch(`${API_BASE}/solve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem }),
        });
        const data = await resp.json();
        showResults(data);
      } catch (err) {
        console.error(err);
      } finally {
        setLoading(false);
      }
    }
  </script>
</body>
</html>
